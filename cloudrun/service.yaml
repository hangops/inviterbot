apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: inviterbot
  labels:
    cloud.googleapis.com/location: us-west1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '100'
        run.googleapis.com/startup-cpu-boost: 'true'
        run.googleapis.com/client-name: cloud-console
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: 526089887735-compute@developer.gserviceaccount.com
      containers:
      - name: inviterbot-1
        image: gcr.io/hangops-jobbot/inviterbot:latest
        ports:
        - name: http1
          containerPort: 3000
        env:
        # Slack configuration
        - name: SLACK_SUBDOMAIN
          value: hangops
        - name: SLACK_CHANNELS
          value: announcements
        - name: SLACKIN_INTERVAL
          value: '120000000'

        # Application configuration
        - name: APP_PORT
          value: '3000'
        - name: SLACKIN_COC
          value: https://github.com/hangops/code-of-conduct
        - name: SLACKIN_CSS
          value: https://signup.hangops.com/css/style.css

        # Domain blocking
        - name: BLOCKDOMAINS_SLACK_LIST
          value: file:///blockdomains.txt

        # Secrets from Secret Manager
        - name: SLACK_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: inviterbot-slack-api-key
              key: latest
        - name: RECAPTCHA_SITEKEY
          valueFrom:
            secretKeyRef:
              name: inviterbot-captcha-sitekey
              key: latest
        - name: RECAPTCHA_SECRET
          valueFrom:
            secretKeyRef:
              name: inviterbot-captcha-secret
              key: latest

        resources:
          limits:
            cpu: 1000m
            memory: 512Mi

        startupProbe:
          timeoutSeconds: 240
          periodSeconds: 240
          failureThreshold: 1
          tcpSocket:
            port: 3000

  traffic:
  - percent: 100
    latestRevision: true
